<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
    <title>Mercado Livre</title>
</head>

<body>
    <header class="header">
        <div class="container">

            <div class="search-container">

                <img alt="logo-mercado-livre" class="logo"
                    src="https://tse2.mm.bing.net/th/id/OIP.xzCdKnP3xbvEy_neA7kUYAHaEH?rs=1&pid=ImgDetMain&o=7&rm=3" />

                <input type="text" id="searchInput" placeholder="Buscar produto... " class="search-input"></input>

                <button id="searchBtn" class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
    </header>
    <section class="hero">
        <h1>Ofertas Imperdíveis</h1>
        <p>Black friday DevClub</p>
    </section>

    <main class="main">
        <div class="container">
            <h2 class="section-title">Ofertas do dia</h2>
            <div class="products-grid" id="productsGrid">
                <!--Os nossos produtos serão inseridos pelo Javascript-->
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Clone do Mercado livre - Oficial DevClub</p>
    </footer>

    <script src="scripts.js"></script>
</body>

</html>
