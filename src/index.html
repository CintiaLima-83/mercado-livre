<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Clone do Mercado Livre com ofertas imperdíveis e produtos em destaque.">

  <!-- Font Awesome otimizado -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css">

  <link rel="stylesheet" href="styles.css">
  <title>Mercado Livre</title>
</head>

<body>
  <header class="header">
    <div class="container">
      <div class="search-container">
        <img alt="logo-mercado-livre" class="logo" src="images/logo.webp" width="120" height="60" />

        <input type="text" id="searchInput" placeholder="Buscar produto..." class="search-input" />

        <button id="searchBtn" class="search-btn" aria-label="Buscar produto">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1>Ofertas Imperdíveis</h1>
    <p>Black Friday DevClub</p>
    <img src="images/banner.webp" alt="Banner de ofertas" width="1200" height="400" class="banner-img" fetchpriority="high" />
  </section>

  <main class="main">
    <div class="container">
      <h2 class="section-title">Ofertas do dia</h2>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </main>

  <footer class="footer">
    <p>Clone do Mercado Livre - Oficial DevClub</p>
  </footer>

  <script src="scripts.js" defer></script>
</body>

</html>
